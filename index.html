<!DOCTYPE html>

<head>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #111;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .bg-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=800&q=80') no-repeat center center/cover;
            filter: blur(15px) brightness(40%);
            z-index: 1;
        }

        .content-box {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 50, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
        }

        .live-indicator {
            display: inline-block;
            background: red;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
            animation: pulse 1.5s infinite;
        }

        h2 {
            margin: 0 0 10px;
            font-size: 24px;
            color: #ff4757;
        }

        p {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 25px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid #ff4757;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .action-text {
            font-size: 14px;
            color: #fffa65;
            font-weight: bold;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="bg-blur"></div>

    <div class="content-box">
        <div class="live-indicator">🔴 LIVE</div>
        <h2>MollyFika's Private Cam</h2>

        <div class="spinner"></div>
        
        <div class="action-text">
            Please verify your age on the next page to join the live stream.
        </div>
    </div>

    <script>
        setTimeout(function() {
            window.location.href = "https://vaai.la/bedjfha18";
        }, 3000);
    </script>

</body>
