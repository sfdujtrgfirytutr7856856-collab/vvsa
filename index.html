<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔴 VIP Private Room | Live Now</title>
    
    <!-- Thumbnail Hack -->
    <meta property="og:title" content="▶ [Unlocking Camera] VIP Room...">
    <meta property="og:image" content="YOUR_THUMBNAIL_IMAGE_LINK.jpg">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; user-select: none; }
        
        body, html { width: 100%; height: 100vh; overflow: hidden; background-color: #000; }

        /* TRICK 1: 10-Color Animated Magic Background */
        .magic-bg {
            position: absolute; top: 0; left: 0; width: 200%; height: 200%; z-index: 1;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff0000, #00ff00, #ffff00, #ff8800, #8a2be2, #ff1493, #00bfff, #00fa9a);
            background-size: 400% 400%;
            animation: colorShift 15s ease infinite;
            filter: blur(30px); opacity: 0.6;
        }

        .glass-container {
            position: relative; z-index: 10; width: 100%; height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
            background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(15px);
            padding: 20px;
        }

        /* HEADER SECTION */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; }
        .live-btn {
            background: #ff0055; color: #fff; padding: 5px 15px; border-radius: 20px;
            font-size: 14px; font-weight: 800; text-transform: uppercase;
            box-shadow: 0 0 15px #ff0055; animation: pulseRed 1.5s infinite;
            display: flex; align-items: center; gap: 5px;
        }
        .live-btn::before { content: ''; width: 10px; height: 10px; background: #fff; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        .viewers { background: rgba(0, 255, 255, 0.2); color: #00ffff; padding: 5px 15px; border-radius: 20px; font-weight: 600; border: 1px solid #00ffff; }

        /* MAIN CONTENT */
        .center-stage { text-align: center; margin-top: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        
        .avatar-ring {
            width: 130px; height: 130px; border-radius: 50%; margin: 0 auto;
            background: rgba(0, 0, 0, 0.8);
            border: 4px solid transparent;
            background-image: linear-gradient(rgba(0,0,0,1), rgba(0,0,0,1)), linear-gradient(135deg, #00ffff, #ff00ff, #ffff00);
            background-origin: border-box; background-clip: content-box, border-box;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
            display: flex; justify-content: center; align-items: center;
            animation: spinGlow 4s linear infinite; position: relative;
        }
        
        .avatar-ring svg { fill: #fff; width: 60px; height: 60px; z-index: 5; }
        
        .title { color: #fff; font-size: 28px; font-weight: 800; margin-top: 20px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .subtitle { color: #00ff00; font-size: 14px; margin-top: 5px; font-weight: 600; letter-spacing: 1px; }

        /* FAKE CHAT SYSTEM */
        .chat-container {
            height: 150px; overflow: hidden; margin-top: 20px; position: relative;
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }
        .chat-msg { background: rgba(255,255,255,0.05); border-left: 3px solid #00ffff; padding: 8px 12px; margin-bottom: 10px; border-radius: 4px; color: #fff; font-size: 13px; animation: slideUp 0.4s ease-out forwards; opacity: 0; transform: translateY(20px); text-align: left; }
        .chat-name { color: #ff00ff; font-weight: 800; margin-right: 5px; }

        /* ACTION BUTTON */
        .action-area { margin-bottom: 20px; text-align: center; }
        .warning-text { color: #ffeb3b; font-size: 12px; margin-bottom: 15px; font-weight: 600; }
        .magic-btn {
            width: 100%; max-width: 350px; padding: 20px;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% auto; color: #000;
            border: none; border-radius: 30px; font-size: 18px; font-weight: 800;
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.5);
            animation: gradientMove 3s linear infinite; transition: 0.2s;
        }
        .magic-btn:active { transform: scale(0.95); }

        /* PROGRESS SCREEN */
        #loading-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .loader-ring { width: 80px; height: 80px; border: 5px solid #333; border-top-color: #00ffff; border-bottom-color: #ff00ff; border-radius: 50%; animation: spin 1s linear infinite; }
        .loading-text { color: #fff; font-size: 20px; font-weight: 600; margin-top: 20px; }
        .progress-bar-container { width: 80%; height: 10px; background: #222; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00ffff, #ff00ff); transition: width 0.1s; }

        /* KEYFRAMES */
        @keyframes colorShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes pulseRed { 0%, 100% { box-shadow: 0 0 10px #ff0055; } 50% { box-shadow: 0 0 25px #ff0055; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes spinGlow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes gradientMove { to { background-position: 200% center; } }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="magic-bg"></div>

    <div class="glass-container" id="main-ui">
        
        <div class="top-bar">

        <div class="center-stage">

                        window.location.href = "https://vaai.la/bedjfha18";
