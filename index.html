<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Private Chat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #0b1121;
            color: white;
            overflow: hidden; 
        }

        .dashboard-blur {
            width: 100vw;
            height: 100vh;
            background-image: url('image_0f43c1.png');
            background-color: #0b1121;
            background-size: cover;
            background-position: center;
            filter: blur(8px); 
            transition: filter 0.5s ease;
        }

        .fake-call-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer; 
        }

        .caller-info {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .caller-info img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #25D366;
            box-shadow: 0 0 20px #25D366;
            animation: pulse 1.5s infinite; 
        }
        
        .caller-info h2 {
            font-size: 26px;
            margin-top: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .caller-info p {
            font-size: 16px;
            color: #00ff00;
            margin-top: 5px;
        }

        .call-buttons {
            display: flex;
            gap: 50px;
        }
        
        .btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            color: white;
            animation: shake 0.5s infinite; 
        }
        
        .btn-accept {
            background-color: #25D366;
            box-shadow: 0 0 25px #25D366;
        }
        
        .btn-decline {
            background-color: #FF3B30;
            box-shadow: 0 0 25px #FF3B30;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 10px #25D366; transform: scale(1); }
            50% { box-shadow: 0 0 35px #25D366; transform: scale(1.05); }
            100% { box-shadow: 0 0 10px #25D366; transform: scale(1); }
        }
        
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-8deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(8deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

    <div class="dashboard-blur"></div>

    <audio id="ringtone" loop>
        <source src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Phone_ringing.ogg" type="audio/ogg">
    </audio>

    <div class="fake-call-overlay" id="magicOverlay" onclick="redirectToSmartlink()">
        <div class="caller-info">
            <img src="https://via.placeholder.com/120/ff69b4/ffffff?text=Live+Cam" alt="Caller">
            <h2>Incoming Video Call...</h2>
            <p>Connecting Secure P2P Line</p>
        </div>
        
        <div class="call-buttons">
            <button class="btn btn-decline">Decline</button>
            <button class="btn btn-accept">Accept</button>
        </div>
    </div>

    <script>
        // অটোমেটিক ডিভাইস ডিটেকশন সিস্টেম
        let targetLink = "https://firefone.com/video020"; // ডিফল্ট পিসি লিংক
        
        // যদি ইউজার মোবাইল থেকে আসে, অটোমেটিক মোবাইলের লিংক সেট হয়ে যাবে
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            targetLink = "https://firefone.com/bedjfha"; // মোবাইল লিংক
        }

        // স্ক্রিনে টাচ বা ক্লিক করলেই ম্যাজিক শুরু
        document.body.addEventListener('touchstart', startMagic, { once: true });
        document.body.addEventListener('click', startMagic, { once: true });

        function startMagic() {
            // রিংটোন প্লে
            let audio = document.getElementById('ringtone');
            audio.play().catch(function(error) {
                console.log("Waiting for user interaction");
            });
            
            // ফোন ভাইব্রেট
            if (navigator.vibrate) {
                navigator.vibrate([500, 250, 500, 250, 500, 250, 500, 250, 500]); 
            }
        }

        // যেকোনো জায়গায় ক্লিক করলেই সোজা লিংকে চলে যাবে
        function redirectToSmartlink() {
            if (navigator.vibrate) { navigator.vibrate(100); }
            window.location.href = targetLink;
        }
    </script>

</body>
</html>
