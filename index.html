<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔴 Live VIP Video</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; user-select: none; }
        
        body, html { width: 100%; height: 100vh; overflow: hidden; background-color: #000; }

        /* HEADER */
        .top-bar {
            position: absolute; top: 0; left: 0; width: 100%; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 50;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }
        .live-btn {
            background: #ff0055; color: #fff; padding: 5px 12px; border-radius: 20px;
            font-size: 13px; font-weight: 800; text-transform: uppercase;
            box-shadow: 0 0 15px #ff0055; animation: blink 1.5s infinite;
        }
        .viewers { color: #fff; font-size: 13px; font-weight: 600; text-shadow: 0 2px 4px #000; }

        /* VIDEO CONTAINER */
        .video-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; justify-content: center; align-items: center; background: #111;
        }
        
        /* IFRAME FOR GOOGLE DRIVE (UPDATED LINK) */
        .drive-iframe {
            width: 100%; height: 100%; border: none; pointer-events: auto;
        }

        /* FAKE PLAY BUTTON OVERLAY */
        .play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.4); z-index: 20; cursor: pointer;
        }
        .play-btn {
            width: 80px; height: 80px; background: rgba(255,0,85,0.9);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 30px #ff0055; animation: pulseBtn 2s infinite;
        }
        .play-btn::after {
            content: ''; border-top: 15px solid transparent; border-bottom: 15px solid transparent;
            border-left: 25px solid #fff; margin-left: 5px;
        }

        /* THE LOCK POPUP */
        .lock-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); z-index: 100;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
            padding: 20px; animation: fadeIn 0.3s ease-out; cursor: pointer;
        }
        .lock-box {
            background: #111; border: 2px solid #00ffff; padding: 30px 20px;
            border-radius: 20px; max-width: 350px; width: 100%;
            box-shadow: 0 10px 40px rgba(0, 255, 255, 0.3);
        }
        .lock-icon { font-size: 45px; margin-bottom: 10px; }
        .lock-title { color: #fff; font-size: 22px; font-weight: 800; margin-bottom: 10px; color: #ff0055; }
        .lock-desc { color: #ccc; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        
        .create-acc-btn {
            width: 100%; padding: 15px; background: linear-gradient(90deg, #ff00ff, #00ffff);
            color: #000; border: none; border-radius: 30px; font-size: 16px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; box-shadow: 0 5px 20px rgba(0, 255, 255, 0.4);
            animation: pulseBtn 2s infinite;
        }

        /* KEYFRAMES */
        @keyframes pulseBtn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="live-btn">🔴 LIVE</div>
        <div class="viewers" id="viewer-count">👁 6,104</div>
    </div>

    <div class="video-container" id="vid-container">
        <!-- UPDATED Google Drive Embed Link -->
        <iframe class="drive-iframe" src="https://drive.google.com/file/d/1NAJ-6WJj0YW3kiAWe7vlVlVNMbX_7pfT/preview" allow="autoplay"></iframe>
        
        <!-- Fake Play Overlay -->
        <div class="play-overlay" id="play-trigger" onclick="startFiveSecondTimer()">
            <div class="play-btn"></div>
        </div>
    </div>

    <!-- THE LOCK SCREEN (Appears after 5 seconds) -->
    <div class="lock-screen" id="lock-screen" onclick="redirectToSmartlink()">
        <div class="lock-box">
            <div class="lock-icon">🔒</div>
            <div class="lock-title">Preview Ended!</div>
            <div class="lock-desc">The free preview is over. Please create a free account to verify your age and continue watching the full broadcast live.</div>
            <button class="create-acc-btn">Create Free Account 🚀</button>
        </div>
    </div>

    <script>
        // Viewer count simulation
        let viewers = 6104;
        setInterval(() => {
            viewers += Math.floor(Math.random() * 15) - 5;
            document.getElementById('viewer-count').innerText = `👁 ${viewers.toLocaleString()}`;
        }, 2000);

        function startFiveSecondTimer() {
            // Remove the play overlay so the video is visible and playable
            document.getElementById('play-trigger').style.display = 'none';
            
            // Start the 5-second countdown
            setTimeout(() => {
                // Show the lock screen
                document.getElementById('lock-screen').style.display = 'flex';
                
                // Stop the video from playing in the background by clearing the iframe source
                const iframe = document.querySelector('.drive-iframe');
                iframe.src = ""; 
                
            }, 5000); // 5000 milliseconds = 5 seconds
        }

        function redirectToSmartlink() {
            // ==========================================
            // 🔥 PUT YOUR SMARTLINK HERE 🔥
            // ==========================================
            window.location.href = "https://vaai.la/bedjfha18"; 
        }
    </script>
</body>
</html>
